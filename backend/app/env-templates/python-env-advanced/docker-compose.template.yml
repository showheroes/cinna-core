services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-${ENV_ID}
    image: agent-python-env-advanced:${ENV_VERSION}

    # Environment variables
    environment:
      - ENV_ID=${ENV_ID}
      - AGENT_ID=${AGENT_ID}
      - ENV_NAME=${ENV_NAME}
      - ENV_VERSION=${ENV_VERSION}
      - DATABASE_URL=${DATABASE_URL}
      - PYTHONPATH=/app
      - AGENT_AUTH_TOKEN=${AGENT_AUTH_TOKEN}
      - AGENT_PORT=${AGENT_PORT}
      - LOG_LEVEL=${LOG_LEVEL}
      - CLAUDE_CODE_WORKSPACE=/app/workspace
      - CLAUDE_CODE_PERMISSION_MODE=acceptEdits
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - DUMP_LLM_SESSION=${DUMP_LLM_SESSION:-true}
      # SDK Adapter Configuration - tells agent-env which adapter to use per mode
      - SDK_ADAPTER_BUILDING=${SDK_ADAPTER_BUILDING:-claude-code/anthropic}
      - SDK_ADAPTER_CONVERSATION=${SDK_ADAPTER_CONVERSATION:-claude-code/anthropic}

    # NO port exposure - communication via agent-bridge network only
    # Backend connects via http://agent-${ENV_ID}:${AGENT_PORT}

    # Volume mounts (host:container) - using absolute host paths
    # Core: system files (server, API) - baked into image, can be updated on rebuild
    # Workspace: user files (scripts, docs, credentials) - persisted across rebuilds
    # Claude sessions: SDK session data - persisted across rebuilds for session resumption
    volumes:
      - ${HOST_INSTANCE_DIR}/app/core:/app/core:ro
      - ${HOST_INSTANCE_DIR}/app/workspace:/app/workspace
      - ${HOST_INSTANCE_DIR}/claude_sessions:/root/.claude

    # Networks: agent-bridge (shared with backend and other agents)
    networks:
      - agent-bridge

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '${CPU_LIMIT:-1.0}'
          memory: ${MEMORY_LIMIT:-512M}
        reservations:
          cpus: '${CPU_RESERVATION:-0.25}'
          memory: ${MEMORY_RESERVATION:-128M}

    # Restart policy
    restart: unless-stopped

    # Health check - uses runtime AGENT_PORT value
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${AGENT_PORT}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  # Shared network with backend for communication
  agent-bridge:
    external: true
    name: agent-bridge
