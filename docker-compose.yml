services:

  backend:
    image: '${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}'
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      - DOMAIN=${DOMAIN}
      - FRONTEND_HOST=${FRONTEND_HOST?Variable not set}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - SECRET_KEY=${SECRET_KEY?Variable not set}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY?Variable not set}
      - FIRST_SUPERUSER=${FIRST_SUPERUSER?Variable not set}
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD?Variable not set}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAILS_FROM_EMAIL=${EMAILS_FROM_EMAIL}
      - POSTGRES_SERVER=${POSTGRES_SERVER}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - SENTRY_DSN=${SENTRY_DSN}
      - AUTH_WHITELIST_USER_DOMAINS=${AUTH_WHITELIST_USER_DOMAINS}
      - ENV_TEMPLATES_DIR=app/env-templates
      - ENV_INSTANCES_DIR=/agent-environments
      - HOST_AGENT_ENVIRONMENTS_DIR=${HOST_AGENT_ENVIRONMENTS_DIR:-./backend/agent-environments}
      - AGENT_ENV_CPU_LIMIT=${AGENT_ENV_CPU_LIMIT:-1.0}
      - AGENT_ENV_MEMORY_LIMIT=${AGENT_ENV_MEMORY_LIMIT:-512M}
      - AGENT_ENV_CPU_RESERVATION=${AGENT_ENV_CPU_RESERVATION:-0.25}
      - AGENT_ENV_MEMORY_RESERVATION=${AGENT_ENV_MEMORY_RESERVATION:-128M}
      - UPLOAD_BASE_PATH=/app/data/uploads
    ports:
      # Expose backend API and WebSocket port
      # WebSocket uses the same port as the HTTP API (Socket.IO upgrades the connection)
      - "8000:8000"
    volumes:
      # Mount Docker socket to allow Docker-from-Docker for agent environments
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount agent-environments directory
      - ${HOST_AGENT_ENVIRONMENTS_DIR:-./backend/agent-environments}:/agent-environments
      # Backend Data Uploads
      - ./backend/data/uploads:/app/data/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/utils/health-check/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default
      - agent-bridge
    build:
      context: ./backend

  frontend:
    image: '${DOCKER_IMAGE_FRONTEND?Variable not set}:${TAG-latest}'
    restart: always
    ports:
      # Expose frontend nginx server
      - "80:80"
    build:
      context: ./frontend
      args:
        - VITE_API_URL=https://api.${DOMAIN?Variable not set}
        - NODE_ENV=production

networks:
  agent-bridge:
    driver: bridge
    name: agent-bridge
